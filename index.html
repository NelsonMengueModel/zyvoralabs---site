<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyvora Labs | Peças 3D Inteligentes, NFC e Customizações</title>
<meta name="description" content="Zyvora Labs - Grife 3D Inteligente. Peças exclusivas com NFC, Core Code, Luminárias, Linha Pet e Miniaturas Customizadas.">

<style>
:root{
  --bg: #05070D;
  --bg2: #090D10;
  --card: #101820;
  --line: #1F3338;
  --text: #FFFFFF;
  --muted: #CFD8DC;
  --blue: #00E7FF;
  --magenta: #D946FF;
  --electric: #3A7BFF;
  --dark-modal: #0B0F14;
}

*{
  box-sizing: border-box;
  scroll-behavior: smooth;
}

body{
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

section{
  padding: 60px 8%;
  background: var(--bg);
}

p{
  color: var(--muted);
  font-size: 16px;
  line-height: 1.6;
}

h1, h2, h3, h4{
  letter-spacing: -.02em;
}

h1{
  font-size: clamp(32px, 5vw, 60px);
  line-height: 1.1;
  margin: 0 0 20px;
}

h2{
  font-size: clamp(26px, 3.5vw, 40px);
  margin-bottom: 25px;
  text-align: center;
}

/* Header & Logo */
header {
  padding: 20px 8%;
  background: rgba(5, 7, 13, 0.9);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.logo-box {
  display: flex;
  align-items: center;
  gap: 15px;
}

.logo-img {
  height: 50px;
  width: auto;
  border-radius: 6px;
  border: 1px solid var(--blue);
}

.logo-text {
  font-family: 'Arial Black', sans-serif;
  font-weight: 900;
  font-size: 24px;
  color: var(--blue);
  letter-spacing: 2px;
}

.logo-text span {
  color: #FFF;
  font-weight: 300;
}

/* Carrossel Dinâmico Altura Ajustada para Conter as Fotos Passando */
.carousel-container {
  background: var(--bg2);
  padding: 40px 0;
  border-bottom: 1px solid var(--line);
  overflow: hidden;
  position: relative;
}

.carousel-track {
  display: flex;
  gap: 30px;
  width: max-content;
  animation: scroll 35s linear infinite;
}

.carousel-track:hover {
  animation-play-state: paused;
}

.carousel-item {
  background: var(--card);
  border: 1px solid var(--line);
  padding: 20px;
  border-radius: 16px;
  width: 290px;
  flex-shrink: 0;
  cursor: pointer;
  transition: transform 0.3s, border-color 0.3s;
  display: flex;
  flex-direction: column;
}

.carousel-item:hover {
  transform: translateY(-5px);
  border-color: var(--blue);
}

.carousel-item.pet-item:hover {
  border-color: var(--magenta);
}

/* Imagens Grandes Dentro do Carrossel que vão Ficar Passando */
.carousel-img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 15px;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.carousel-img.pet-thumb {
  border-color: rgba(217, 70, 255, 0.4);
  box-shadow: 0 0 10px rgba(217, 70, 255, 0.15);
}

.carousel-item strong {
  color: var(--blue);
  display: block;
  font-size: 16px;
  margin-bottom: 6px;
}

.carousel-item.pet-item strong {
  color: var(--magenta);
}

.carousel-item span {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.4;
  display: block;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(calc(-290px * 5 - 150px)); }
}

/* Hero Section */
.hero {
  padding: 80px 8%;
  background: radial-gradient(circle at 80% 20%, rgba(0,231,255,0.12), transparent 40%), var(--bg);
  text-align: center;
}

/* Grids & Cards */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
  margin-top: 20px;
}

.card {
  background: linear-gradient(180deg, var(--card), #090C0F);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 25px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  transition: box-shadow 0.3s;
}

.card:hover {
  box-shadow: 0 0 20px rgba(0, 231, 255, 0.1);
}

.card h3 {
  color: #FFF;
  margin-top: 0;
  font-size: 19px;
  border-left: 4px solid var(--blue);
  padding-left: 10px;
}

.card h3.pet-title {
  border-left-color: var(--magenta);
}

.card-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  margin: 15px 0;
  border: 1px solid rgba(255,255,255,0.05);
}

.card-img.highlight {
  border: 1px solid var(--magenta);
  box-shadow: 0 0 15px rgba(217, 70, 255, 0.25);
}

/* Botões */
.btn {
  background: var(--blue);
  color: #05070D;
  border: 0;
  padding: 12px 24px;
  border-radius: 8px;
  font-weight: bold;
  text-decoration: none;
  display: inline-block;
  text-align: center;
  cursor: pointer;
  transition: opacity 0.2s;
}

.btn:hover {
  opacity: 0.9;
}

.btn-sm {
  background: transparent;
  border: 1px solid var(--blue);
  color: var(--blue);
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
  margin-top: 15px;
  transition: all 0.2s;
}

.btn-sm:hover {
  background: rgba(0, 231, 255, 0.1);
}

.btn-magenta {
  border-color: var(--magenta);
  color: var(--magenta);
}

.btn-magenta:hover {
  background: rgba(217, 70, 255, 0.1);
}

/* Modais Inteligentes */
.modal {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(5, 7, 13, 0.85);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  padding: 20px;
}

.modal.active {
  opacity: 1;
  pointer-events: auto;
}

.modal-content {
  background: var(--dark-modal);
  border: 1px solid var(--line);
  padding: 40px;
  border-radius: 20px;
  max-width: 650px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.modal-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: transparent;
  border: 0;
  color: var(--muted);
  font-size: 28px;
  cursor: pointer;
}

.modal-close:hover {
  color: #FFF;
}

.modal h4 {
  color: var(--blue);
  font-size: 24px;
  margin-top: 0;
  margin-bottom: 15px;
}

.modal ul {
  padding-left: 20px;
  color: var(--muted);
}

.modal ul li {
  margin-bottom: 10px;
  line-height: 1.5;
}

/* Footer */
footer {
  padding: 40px 8%;
  background: #020305;
  border-top: 1px solid var(--line);
  text-align: center;
  color: var(--muted);
}

@media(max-width: 768px) {
  .modal-content { padding: 25px; }
  header { flex-direction: column; gap: 15px; text-align: center; }
}
</style>
</head>

  <div class="logo-box">
    <img src="Logo Zyvoralabs.jpeg" class="
