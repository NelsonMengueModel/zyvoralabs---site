<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyvora Labs | Peças 3D Inteligentes e Exclusivas</title>
<meta name="description" content="A Zyvora Labs cria peças 3D personalizadas e exclusivas com tecnologia NFC, CareCode, luminárias artísticas e brindes corporativos de alto padrão.">
<style>
:root{
  --bg:#05070D;
  --bg2:#090D10;
  --card:#101820;
  --line:#1F3338;
  --text:#FFFFFF;
  --muted:#CFD8DC;
  --blue:#00E7FF;
  --magenta:#D946FF;
}
*{box-sizing:border-box;scroll-behavior:smooth}
body{margin:0;font-family:Arial, Helvetica, sans-serif;background:var(--bg);color:var(--text);overflow-y:auto;overflow-x:hidden;}
section{padding:60px 8%;position: relative;background: var(--bg);}
p{color:var(--muted);font-size:17px;line-height:1.6;}
h1,h2,h3{letter-spacing:-.03em}
h1{font-size:clamp(36px,5vw,64px);max-width:950px;line-height:1.05;margin:0 0 20px}
h2{font-size:clamp(28px,3.5vw,42px);margin:0 0 15px;color:#FFFFFF}
h3{font-size:20px;margin:0 0 10px;color:var(--blue)}
.highlight{color:var(--magenta)}

/* Hero Impacto Inicial */
.hero {
  min-height: 80vh;
  display: flex;
  align-items: center;
  background:
    radial-gradient(circle at 80% 10%,rgba(0,231,255,.12),transparent 35%),
    radial-gradient(circle at 20% 80%,rgba(217,70,255,.1),transparent 35%),
    linear-gradient(135deg,#05070D,#111820 75%);
  padding: 40px 8%;
}
.hero-content{max-width:900px; width: 100%;}
.logo-container{padding:0 0 20px 0; font-size:30px; font-family:'Arial Black', sans-serif; font-weight:900; letter-spacing:3px;}
.logo-zyvora{color:var(--blue); text-shadow:0 0 10px rgba(0,231,255,0.3);}
.badge{display:inline-block;border:1px solid var(--blue);color:var(--blue);padding:6px 14px;border-radius:40px;font-size:12px;margin-bottom:20px;text-transform:uppercase;background:rgba(0,231,255,.04)}
.buttons{margin-top:25px;display:flex;flex-wrap:wrap;gap:12px}

/* Botões */
.btn{background:var(--blue);color:#001014;border:0;padding:14px 28px;border-radius:10px;font-weight:800;text-decoration:none;box-shadow:0 0 20px rgba(0,231,255,.15);transition:0.3s ease;text-align:center;}
.btn:hover{transform:translateY(-2px);opacity:0.9;}
.btn.secondary{background:transparent;border:1px solid var(--blue);color:var(--blue);box-shadow:none}
.btn.magenta{background:var(--magenta);color:#080910;box-shadow:0 0 20px rgba(217,70,255,.15)}
